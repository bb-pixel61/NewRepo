<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Last Well</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%A7%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <h1 id="title">THE LAST WELL</h1>
        <button id="restart" type="button" title="Restart from the beginning">↺ restart</button>
      </header>
      <canvas id="scene" width="320" height="180"></canvas>
      <section id="hud">
        <div class="hud-card">
          <h2>Map</h2>
          <canvas id="minimap" width="160" height="100"></canvas>
          <div id="location"></div>
        </div>
        <div class="hud-card">
          <h2>You</h2>
          <ul id="character"></ul>
        </div>
        <div class="hud-card">
          <h2>Pack</h2>
          <ul id="inventory"></ul>
        </div>
      </section>
      <main id="panel">
        <div id="text" aria-live="polite"></div>
        <div id="feedback" aria-live="polite"></div>
        <form id="prompt">
          <span class="caret" aria-hidden="true">&gt;</span>
          <input
            id="command"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="what do you do?"
            aria-label="Type your action"
          />
        </form>
      </main>
      <footer id="hints">type your action · 'hint' if stuck · click text to skip</footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
