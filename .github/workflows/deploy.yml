name: Deploy to GitHub Pages

# The Pages environment only lets the repository's default branch deploy,
# and the default is currently claude/newrepo-setup-y194hf. Trigger only
# from that branch so runs never race or hit the environment gate.
# If the default branch ever changes to main, swap the branch name below.
on:
  push:
    branches: [claude/newrepo-setup-y194hf]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
